[server]
enable_gzip = true

[database]
type = sqlite3
cache_mode = shared

[dataproxy]
timeout = 30
keep_alive_seconds = 30
max_conns_per_host = 5

[users]
viewers_can_edit = false
editors_can_admin = false

[auth.anonymous]
enabled = false

[snapshots]
external_enabled = false

[metrics]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false

[unified_alerting]
max_attempts = 1

[rendering]
concurrent_render_limit = 2

[caching]
enabled = true
ttl = 300
