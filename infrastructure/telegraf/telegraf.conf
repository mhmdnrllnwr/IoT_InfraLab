[agent]
  interval = "30s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "30s"
  flush_jitter = "0s"
  precision = ""
  hostname = "telegraf"
  omit_hostname = false

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  fieldinclude = ["usage_idle"]

[[inputs.mem]]

[[inputs.system]]

[[inputs.net]]

[[inputs.docker]]
  endpoint = "tcp://docker-proxy:2375"
  timeout = "5s"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "infralab"
  bucket = "platform_metrics"
