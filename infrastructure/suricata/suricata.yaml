%YAML 1.1
---
# Suricata Configuration for IoT-InfraLab

vars:
  address-groups:
    HOME_NET: "[172.18.0.0/24]" # Your Docker Subnet
    EXTERNAL_NET: "any"

  port-groups:
    HTTP_PORTS: "80"
    SHELLCODE_PORTS: "!80"
    SSH_PORTS: "22"

# -----------------------------------------------------------------------------
# LOGGING CONFIGURATION
# -----------------------------------------------------------------------------
default-log-dir: /var/log/suricata/

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      append: yes
      types:
        - alert:
            payload: no
            payload-printable: no
            packet: no
        - http:
            enabled: yes
        - mqtt:
            enabled: yes             # Critical for your IoT project
        - files:
            force-magic: no
        - drop:
            enabled: yes             # Logs when IPS blocks a packet

# -----------------------------------------------------------------------------
# COMMAND & CONTROL (The Socket)
# -----------------------------------------------------------------------------
# This allows Node-RED to swap rules from Alert to Reject
unix-command:
  enabled: yes
  filename: /var/run/suricata/suricata-command.socket

# -----------------------------------------------------------------------------
# NETWORK CAPTURE ENGINE
# -----------------------------------------------------------------------------
# Changed from eth0 to 'any' to ensure visibility in Docker shared network
af-packet:
  - interface: any
    threads: 1
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes

# -----------------------------------------------------------------------------
# PROTOCOL SETTINGS
# -----------------------------------------------------------------------------
app-layer:
  protocols:
    mqtt:
      enabled: yes
    http:
      enabled: yes
    tls:
      enabled: yes

# CRITICAL FOR WINDOWS/WSL2: Disable checksums to prevent "Blind IDS"
stream:
  checksum-validation: no

# -----------------------------------------------------------------------------
# RULE MANAGEMENT
# -----------------------------------------------------------------------------
rule-files:
  - /etc/suricata/rules/local.rules

# How often to write to the JSON file (seconds)
heartbeat:
  output-flush-interval: 1