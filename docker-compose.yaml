services:
  # ----------------------------------------
  # THE TRUSTED ZONE (Core Infrastructure)
  # ----------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_broker
    networks:
      - iot_infralab_net
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/config:/mosquitto/config
      - ./infrastructure/mosquitto/data:/mosquitto/data
      - ./infrastructure/mosquitto/log:/mosquitto/log
    command: mosquitto -c /mosquitto/config/mosquitto_vulnerable.conf
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

  nodered:
    image: nodered/node-red:latest
    container_name: iot_nodered
    user: "root"
    environment:
      - NODE_OPTIONS=--max-old-space-size=256 --max-semi-space-size=2
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET:-change_this_secret}
    networks:
      iot_infralab_net:
        ipv4_address: 172.18.0.25
    ports:
      - "1880:1880"
    volumes:
      - ./src/simulation/nodered/NodeRed_Data:/data
      - ./config:/data/config
    restart: unless-stopped
    depends_on:
      - mosquitto
      - docker-proxy
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 256m

  # ----------------------------------------
  # THE MANAGEMENT ZONE (Docker API Proxy)
  # ----------------------------------------
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker_api_proxy
    networks:
      - iot_infralab_net
    environment:
      - CONTAINERS=1 # Allow Node-RED to manage containers
      - POST=1       # Allow POST requests (needed to create/start/stop)
      - DELETE=1     # Allows the "Kill Switch" to remove containers!
      - NETWORKS=1   # Allows new sensors to connect to iot_infralab_net
      - IMAGES=1     # Allows Node-RED to verify your general-iot-sensor image
      - EXEC=1       # Allows Node-RED to launch exec commands inside containers
      - INFO=1       # Allows Telegraf to query Docker daemon info
      - GET=1

    volumes:
      # The proxy safely holds the socket and translates HTTP requests to it
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Notice there are no external ports mapped here.
    # It is completely hidden from your Windows host, making it highly secure!
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32m

  # ----------------------------------------
  # THE ANALYTICS ZONE (Time-Series & Dashboard)
  # ----------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel_collector
    networks:
      - iot_infralab_net
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - ./infrastructure/otel/otel-config.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped
    depends_on:
      - tempo
      - influxdb
    deploy:
      resources:
        limits:
          memory: 128m

  loki:
    image: grafana/loki:latest
    container_name: loki
    networks:
      - iot_infralab_net
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml -target=all
    volumes:
      - ./infrastructure/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 192m

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    networks:
      - iot_infralab_net
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infrastructure/tempo/tempo-config.yaml:/etc/tempo.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    networks:
      iot_infralab_net:
        ipv4_address: 172.18.0.10
    volumes:
      - ./infrastructure/suricata/logs:/var/log/suricata:ro
      - ./infrastructure/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 64m

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    env_file:
      - .env
    environment:
      - INFLUXD_ENGINE_CACHE_MAX_MEMORY_SIZE=256MB
      - INFLUXD_ENGINE_CACHE_SNAPSHOT_MEMORY_SIZE=64MB
    networks:
      - iot_infralab_net
    ports:
      - "8086:8086"
    volumes:
      - ./infrastructure/influxdb/data:/var/lib/influxdb2
      - ./infrastructure/influxdb/config:/etc/influxdb2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    env_file:
      - .env
    networks:
      - iot_infralab_net
    volumes:
      - ./infrastructure/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    restart: unless-stopped
    depends_on:
      - influxdb
      - docker-proxy
    deploy:
      resources:
        limits:
          memory: 80m

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    env_file:
      - .env
    environment:
      - GF_METRICS_ENABLED=false
      - GF_DATABASE_CACHE_MODE=shared
    networks:
      - iot_infralab_net
    ports:
      - "3000:3000"
    volumes:
      - ./infrastructure/grafana/data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    restart: unless-stopped
    depends_on:
      - influxdb
    deploy:
      resources:
        limits:
          memory: 384m
        reservations:
          memory: 192m

  # ----------------------------------------
  # INTRUSION DETECTION SYSTEM (Suricata Sidecar)
  # ----------------------------------------
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata-ids
    user: root
    network_mode: "service:mosquitto"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      # Use the exact internal paths Suricata expects
      - ./infrastructure/suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./infrastructure/suricata/local.rules:/etc/suricata/rules/local.rules
      - ./infrastructure/suricata/local.rules.ids:/etc/suricata/rules/local.rules.ids
      - ./infrastructure/suricata/local.rules.vuln:/etc/suricata/rules/local.rules.vuln
      - ./infrastructure/suricata/logs:/var/log/suricata
      # NEW: Explicitly mount the run directory for the socket
      - ./infrastructure/suricata/run:/var/run/suricata
    command: -i eth0
    restart: unless-stopped
    depends_on:
      - mosquitto
    deploy:
      resources:
        limits:
          memory: 256m

  security-auditor:
    build: ./src/simulation/auditor_security
    container_name: security_auditor
    networks:
      iot_infralab_net:
        ipv4_address: 172.18.0.100
    env_file:
      - .env
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      - mosquitto
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  iot_infralab_net:
    name: iot_infralab_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
    driver_opts:
      com.docker.network.bridge.name: br-iotlab

volumes: {}
